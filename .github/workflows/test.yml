name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest torch transformers huggingface-hub
          pip install -e . --no-deps

      - name: Run fast tests (no model weights)
        run: |
          python -m pytest tests/ -x -v -m "not slow"
