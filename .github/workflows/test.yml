name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .
          # Install Dilemma from git for lemmatization tests
          pip install git+https://github.com/ciscoriordan/dilemma.git || true

      - name: Run fast tests (no model weights)
        run: |
          # Only run tests not marked @pytest.mark.slow.
          # Slow tests require model weights (500MB+ BERT downloads)
          # and are meant for local development, not CI.
          python -m pytest tests/ -x -v
