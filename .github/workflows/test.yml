name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install package (no deps, already installed)
        run: pip install --break-system-packages -e . --no-deps

      - name: Run all tests (including slow)
        run: python -m pytest tests/ -x -v --run-slow
